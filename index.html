function Shape({ type, color, size }) {
  if (type === "circle")     return <div style={{ width:size, height:size, borderRadius:"50%", background:color }} />;
  if (type === "halfcircle") return <div style={{ width:size, height:size/2, borderRadius:`${size}px ${size}px 0 0`, background:color }} />;
  if (type === "triangle")   return <div style={{ width:0, height:0, borderLeft:`${size/2}px solid transparent`, borderRight:`${size/2}px solid transparent`, borderBottom:`${Math.round(size*0.87)}px solid ${color}` }} />;
  return null;
}

function FloatingShapes() {
  const [scrollY, setScrollY] = useState(0);
  useEffect(() => {
    const fn = () => setScrollY(window.scrollY);
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return (
    <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:3, overflow:"hidden" }}>
      {SHAPES.map((s,i) => {
        const y = s.startY - scrollY * 0.25 - i * 8;
        return (
          <div key={i} style={{
            position:"absolute", left:s.x, top:y,
            transform:`rotate(${scrollY * 0.05 + i * 18}deg)`,
            transition:"top 0.05s linear",
          }}>
            <Shape {...s} />
          </div>
        );
      })}
    </div>
  );
}

        <path d="M0,0 L1440,0 L1440,30 C1200,60 960,10 720,35 C480,60 240,10 0,40 Z" fill={C.almond}/>
        <path d="M0,40 C240,10 480,60 720,35 C960,10 1200,60 1440,30 L1440,60 L0,60 Z" fill={C.cinnabar}/>
      </svg>
      <div style={{ padding:"60px 48px 80px", textAlign:"center", position:"relative" }}>
        <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:600, height:600, borderRadius:"50%", background:"radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%)", pointerEvents:"none" }} />
        <h2 style={{ fontFamily:FONT_DISPLAY, fontWeight:900, color:"#FEFAF7", fontSize:"clamp(2rem, 3.5vw, 3rem)", lineHeight:1.1, marginBottom:8, letterSpacing:"-0.02em", position:"relative" }}>Special Edition</h2>
        <p style={{ fontSize:"1.1rem", color:"rgba(255,255,255,0.9)", marginBottom:8, fontWeight:300, fontStyle:"italic", position:"relative" }}>That your AI couldn't copy.</p>
        <p style={{ fontSize:"1rem", color:"rgba(255,255,255,0.75)", marginBottom:36, fontWeight:300, position:"relative" }}>A newsletter with real strategies and real examples every week to start building a trust-worthy brand.</p>
      {!done ? (
        <div style={{ display:"flex", gap:12, maxWidth:480, margin:"0 auto", position:"relative" }}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" onKeyDown={e=>e.key==="Enter"&&submit()} style={{ flex:1, background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.4)", borderRadius:999, padding:"14px 20px", fontFamily:FONT_BODY, fontSize:"0.9rem", color:"#FEFAF7", outline:"none" }} />
          <button onClick={submit} style={{ background:C.espresso, color:"#FEFAF7", border:"none", padding:"14px 24px", borderRadius:999, fontFamily:FONT_BODY, fontSize:"0.875rem", fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>Subscribe →</button>
        </div>
      ) : (
        <p style={{ color:"#FEFAF7", fontSize:"1rem", fontWeight:700, position:"relative" }}>You're in. 🫠 Talk soon.</p>
      )}
      <p style={{ fontSize:"0.75rem", color:"rgba(255,255,255,0.5)", marginTop:14, position:"relative" }}>No spam. Unsubscribe anytime.</p>
      </div>
    </section>
  );
}

          <a href="https://calendly.com/jenniferawatters/45-min-meeting" target="_blank" style={{ display:"block", fontSize:"0.85rem", color:"rgba(247,239,231,0.6)", textDecoration:"none" }}>Book a Call</a>

          <h5 style={{ fontSize:"0.7rem", letterSpacing:"0.14em", textTransform:"uppercase", color:"rgba(247,239,231,0.4)", marginBottom:16, marginTop:0 }}>Connect</h5>

          ))}
        </div>
      </footer>
      <div style={{ padding:"24px 48px", borderTop:"1px solid rgba(247,239,231,0.06)", display:"flex", justifyContent:"space-between", background:C.espresso, position:"relative", zIndex:2 }}>
        <p style={{ fontSize:"0.75rem", color:"rgba(247,239,231,0.3)", margin:0 }}>© 2025 JenAI. All rights reserved. Built with <span style={{ color:C.cinnabar }}>♥</span> in Montréal.</p>
        <p style={{ fontSize:"0.7rem", color:"rgba(247,239,231,0.2)", margin:0 }}>jenai.ca</p>

}

function App() {
  return (
    <div style={{ fontFamily:FONT_BODY, background:C.linen, overflowX:"hidden" }}>
      <FloatingShapes />
      <div style={{ position:"relative", zIndex:1 }}>
        <Nav />
        <Hero />
      </div>

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
