function Shape({ type, color, size }) {
  if (type === "circle")     return <div style={{ width:size, height:size, borderRadius:"50%", background:color }} />;
  if (type === "halfcircle") return <div style={{ width:size, height:size/2, borderRadius:`${size}px ${size}px 0 0`, background:color }} />;
  if (type === "triangle")   return <div style={{ width:0, height:0, borderLeft:`${size/2}px solid transparent`, borderRight:`${size/2}px solid transparent`, borderBottom:`${Math.round(size*0.87)}px solid ${color}` }} />;
  return null;
}

function FloatingShapes() {
  const [scrollY, setScrollY] = useState(0);
  useEffect(() => {
    const fn = () => setScrollY(window.scrollY);
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return (
    <div className="mob-shapes" style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:3, overflow:"hidden" }}>
      {SHAPES.map((s,i) => {
        const y = s.startY - scrollY * 0.25 - i * 8;
        return (
          <div key={i} style={{
            position:"absolute", left:s.x, top:y,
            transform:`rotate(${scrollY * 0.05 + i * 18}deg)`,
            transition:"top 0.05s linear",
          }}>
            <Shape {...s} />
          </div>
        );
      })}
    </div>
  );
}

function LeadForm({ onClose }) {
  const [form, setForm] = useState({ name:"", email:"", company:"", challenge:"" });
  const [consent, setConsent] = useState(false);
  const [status, setStatus] = useState("idle");

  const submit = async () => {
    if (!form.name || !form.email || !form.challenge || !consent) return;
    setStatus("loading");
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...form, consent: true, source: "lead-form", date: new Date().toISOString() }),
      });
      const leads = JSON.parse(localStorage.getItem("jenai_leads") || "[]");
      leads.push({ ...form, consent: true, source: "lead-form", date: new Date().toISOString() });
      localStorage.setItem("jenai_leads", JSON.stringify(leads));
      setStatus("success");
    } catch {
      setStatus("error");
    }
  };

    width: "100%", background: "#F7EFE7",
    border: "1px solid rgba(58,47,45,0.15)", borderRadius: 12,
    padding: "13px 16px", fontFamily: FONT_BODY, fontSize: "0.9rem",

    display: "block",

    <div style={{
      position: "fixed", inset: 0, zIndex: 9000,

            <div style={{ fontSize: "3rem", marginBottom: 16 }}>🫠</div>
            <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: "1.6rem", color: C.espresso, marginBottom: 12 }}>
              You're in good hands.
            </h3>
            <p style={{ fontSize: "0.95rem", color: "rgba(58,47,45,0.7)", lineHeight: 1.6 }}>
              The real Jen will be in touch shortly.
            </p>
          </div>
        ) : (
          <>
            {/* Top accent */}
            <div style={{ height: 4, background: `linear-gradient(90deg, ${C.cinnabar}, ${C.honeycomb})`, borderRadius: 999, marginBottom: 28 }} />

            <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: "1.6rem", color: C.espresso, marginBottom: 8, marginTop: 0 }}>
              Let's talk.
            </h3>
            <p style={{ fontSize: "0.875rem", color: "rgba(58,47,45,0.6)", marginBottom: 28, lineHeight: 1.6 }}>
              A human-to-human (okay, and maybe my AI notetaker) conversation about what's not working and whether I can help.
            </p>

            <input
              placeholder="Your name *"
              value={form.name}
              onChange={e => update("name", e.target.value)}
              style={inputStyle}
            />
            <input
              type="email"
              placeholder="Email address *"
              value={form.email}
              onChange={e => update("email", e.target.value)}
              style={inputStyle}
            />
            <input
              placeholder="Company or website (optional)"
              value={form.company}
              onChange={e => update("company", e.target.value)}
              style={inputStyle}
            />
            <select
              value={form.challenge}
              onChange={e => update("challenge", e.target.value)}
              style={{ ...inputStyle, color: form.challenge ? C.espresso : "rgba(58,47,45,0.4)", cursor: "pointer" }}

              <p style={{ color: C.cinnabar, fontSize: "0.8rem", marginBottom: 12 }}>
                Something went wrong. Email me directly at hello@jenai.ca

function Testimonials() {
  const [idx, setIdx] = useState(0);
  const [fading, setFading] = useState(false);
  const timer = useRef(null);

  const go = (next) => {
    setFading(true);
    setTimeout(() => { setIdx(next); setFading(false); }, 250);
  };
  const resetTimer = (next) => {
    clearInterval(timer.current);
    timer.current = setInterval(() => go((next+1) % TESTIMONIALS.length), 7000);
  };
  useEffect(() => {
    timer.current = setInterval(() => go((idx+1) % TESTIMONIALS.length), 7000);
    return () => clearInterval(timer.current);
  }, [idx]);

  const t = TESTIMONIALS[idx];
  return (
    <section className="mob-testimonials" style={{ background:C.espresso, padding:"80px 48px", textAlign:"center", position:"relative", overflow:"hidden", zIndex:2 }}>
      <div style={{ position:"absolute", top:-20, left:"50%", transform:"translateX(-50%)", fontFamily:FONT_DISPLAY, fontSize:"16rem", fontWeight:900, color:"rgba(219,62,29,0.06)", lineHeight:1, pointerEvents:"none", userSelect:"none" }}>"</div>

        <cite style={{ fontStyle:"normal", fontSize:"0.8rem", color:"rgba(247,239,231,0.5)", letterSpacing:"0.1em", textTransform:"uppercase" }}>
          <strong style={{ color:C.honeycomb }}>{t.name}</strong> - {t.role}
        </cite>
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:20, marginTop:40 }}>
        <button onClick={() => { const n=(idx-1+TESTIMONIALS.length)%TESTIMONIALS.length; go(n); resetTimer(n); }} style={{ width:40, height:40, borderRadius:"50%", border:"1px solid rgba(247,239,231,0.2)", background:"none", color:C.almond, cursor:"pointer", fontSize:"1rem", display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>
        <div style={{ display:"flex", gap:8 }}>
          {TESTIMONIALS.map((_,i) => (
            <button key={i} onClick={() => { go(i); resetTimer(i); }} style={{ width:i===idx?24:8, height:8, borderRadius:999, border:"none", cursor:"pointer", background:i===idx?C.cinnabar:"rgba(247,239,231,0.2)", transition:"all 0.3s ease", padding:0 }} />

        <button onClick={() => { const n=(idx+1)%TESTIMONIALS.length; go(n); resetTimer(n); }} style={{ width:40, height:40, borderRadius:"50%", border:"1px solid rgba(247,239,231,0.2)", background:"none", color:C.almond, cursor:"pointer", fontSize:"1rem", display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
      </div>

function EmailSection() {
  const [email, setEmail] = useState("");
  const [consent, setConsent] = useState(false);
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    if (!email.includes("@") || !consent) return;
    setLoading(true);
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST", mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, consent: true, source: "newsletter-banner", date: new Date().toISOString() }),
      });
      const leads = JSON.parse(localStorage.getItem("jenai_leads")||"[]");
      if (!leads.find(l=>l.email===email)) leads.push({ email, consent: true, source:"newsletter-banner", date:new Date().toISOString() });
      localStorage.setItem("jenai_leads", JSON.stringify(leads));
      setDone(true);
    } catch { setDone(true); } // still show success - localStorage saved
    setLoading(false);
  };

  return (
    <section id="email" style={{ background:C.cinnabar, position:"relative", zIndex:2, overflow:"hidden" }}>
      <svg viewBox="0 0 1440 60" preserveAspectRatio="none" style={{ display:"block", width:"100%", height:60, marginBottom:-2 }}>

        <p style={{ fontSize:"1.1rem", color:"rgba(255,255,255,0.9)", marginBottom:8, fontWeight:300, fontStyle:"italic", position:"relative" }}>That your AI couldn't copy.</p>
        <p style={{ fontSize:"1rem", color:"rgba(255,255,255,0.75)", marginBottom:36, fontWeight:300, position:"relative" }}>A newsletter with real strategies and real examples every week to start building a trust-worthy brand.</p>
        {!done ? (
          <div style={{ maxWidth:480, margin:"0 auto", position:"relative" }}>
            <div className="mob-email-form" style={{ display:"flex", gap:12, marginBottom:14 }}>

              <button onClick={submit} disabled={!consent || loading} style={{ background: consent ? C.espresso : "rgba(36,28,26,0.4)", color:"#FEFAF7", border:"none", padding:"14px 24px", borderRadius:999, fontFamily:FONT_BODY, fontSize:"0.875rem", fontWeight:700, cursor: consent ? "pointer" : "not-allowed", whiteSpace:"nowrap", transition:"background 0.2s" }}>{loading ? "..." : "Subscribe →"}</button>

function CookieBanner() {
  const [visible, setVisible] = React.useState(false);
  const [lang, setLang] = React.useState("en");

  React.useEffect(() => {
    const consent = localStorage.getItem("jenai_cookie_consent");
    if (!consent) setVisible(true);
  }, []);

  const accept = () => {
    localStorage.setItem("jenai_cookie_consent", "accepted");
    localStorage.setItem("jenai_cookie_date", new Date().toISOString());
    setVisible(false);
  };

  const decline = () => {
    localStorage.setItem("jenai_cookie_consent", "declined");
    localStorage.setItem("jenai_cookie_date", new Date().toISOString());
    setVisible(false);
  };

  if (!visible) return null;

  const t = {
    en: {
      message: "We use cookies to collect email signups and understand how visitors use our site. No data is sold or shared with third parties.",
      accept: "Accept",
      decline: "Decline",
      policy: "Privacy Policy",
    },
    fr: {
      message: "Nous utilisons des cookies pour recueillir des inscriptions par courriel et comprendre comment les visiteurs utilisent notre site. Aucune donnée n'est vendue ou partagée avec des tiers.",
      accept: "Accepter",
      decline: "Refuser",
      policy: "Politique de confidentialité",
    }
  };

  const copy = t[lang];

  return (
    <div style={{
      position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 9999,
      background: C.espresso, borderTop: `3px solid ${C.cinnabar}`,
      padding: "20px 48px", display: "flex", alignItems: "center",
      justifyContent: "space-between", flexWrap: "wrap", gap: 16,
      boxShadow: "0 -4px 24px rgba(0,0,0,0.2)",
    }}>
      <p style={{ fontFamily: FONT_BODY, fontSize: "0.85rem", color: "rgba(247,239,231,0.85)", lineHeight: 1.6, maxWidth: 640, margin: 0 }}>
        {copy.message}{" "}
        <a href="privacy.html" style={{ color: C.honeycomb, textDecoration: "underline" }}>{copy.policy}</a>
      </p>
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
        {/* Language toggle */}
        <div style={{ display: "flex", gap: 8 }}>
          {["en","fr"].map(l => (
            <button key={l} onClick={() => setLang(l)} style={{
              background: lang === l ? C.cinnabar : "transparent",
              color: lang === l ? "#FEFAF7" : "rgba(247,239,231,0.5)",
              border: `1px solid ${lang === l ? C.cinnabar : "rgba(247,239,231,0.2)"}`,
              padding: "6px 12px", borderRadius: 999, fontFamily: FONT_BODY,
              fontSize: "0.75rem", fontWeight: 700, cursor: "pointer",
              textTransform: "uppercase", letterSpacing: "0.06em",
            }}>{l.toUpperCase()}</button>
          ))}
        </div>
        <button onClick={decline} style={{
          background: "transparent", color: "rgba(247,239,231,0.6)",
          border: "1px solid rgba(247,239,231,0.2)", padding: "10px 22px",
          borderRadius: 999, fontFamily: FONT_BODY, fontSize: "0.85rem",
          fontWeight: 700, cursor: "pointer",
        }}>{copy.decline}</button>
        <button onClick={accept} style={{
          background: C.cinnabar, color: "#FEFAF7", border: "none",
          padding: "10px 22px", borderRadius: 999, fontFamily: FONT_BODY,
          fontSize: "0.85rem", fontWeight: 700, cursor: "pointer",
        }}>{copy.accept}</button>
      </div>
    </div>
  );
}

      <MeetJen onOpenForm={() => setShowForm(true)} />
      <Services onOpenForm={() => setShowForm(true)} />
      <Testimonials />
      <FAQSection />
      <EmailSection />
      <Footer onOpenForm={() => setShowForm(true)} />
      <CookieBanner />
      {showForm && <LeadForm onClose={() => setShowForm(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
